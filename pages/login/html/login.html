<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Future University</title>
    <link rel="stylesheet" href="../../auth/css/auth.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../../style.css"><link rel="stylesheet" href="../../dashboard/css/dashboard.css"></head>
<body>
    <div class="auth-container">
        <div class="auth-panel">
            <h2>Welcome Back!</h2>
            <p>Log in to access your dashboard, courses, and student resources.</p>
        </div>
        <div class="auth-form-container">
            <a href="../../../index.html" class="back-home-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <form class="auth-form">
                <h3>Login to Your Account</h3>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" placeholder="email@example.com" id="email" required="">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" placeholder="Enter your password" id="password" required="">
                </div>
                
                <button type="button" class="auth-btn" onclick="login()">Log In</button>
                
                <div class="divider">or continue with</div>

                <div class="social-login">
                    <button type="button" class="social-btn"><i class="fab fa-google"></i> Google</button>
                    <button type="button" class="social-btn"><i class="fab fa-facebook"></i> Facebook</button>
                </div>

                <p class="form-switch">Don't have an account? <a href="../../signup/html/signup.html">Sign Up</a></p>
            </form>
        </div>
    </div>
    
    <script src="login.js"></script>


<script src="../../../script.js"></script><script src="../../signup/js/signup.js"></script><script src="../js/login.js"></script><script src="../../dashboard/js/dashboard.js"></script></body></html>
